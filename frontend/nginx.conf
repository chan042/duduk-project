server {
    listen 8080;
    server_name _;
    absolute_redirect off;
    port_in_redirect off;

    if ($host = duduk-web-staging-htj7x3xmnq-du.a.run.app) {
        return 308 https://duduk-web-staging-128789205583.asia-northeast3.run.app$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location = /healthz/ {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = / {
        try_files /index.html =404;
    }

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }
}
